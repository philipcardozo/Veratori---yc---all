*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;
  --accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--orange:#f78166;--purple:#bc8cff;
  --text:#c9d1d9;--muted:#8b949e;--white:#f0f6fc;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;height:100vh;overflow:hidden}
#sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#shead{padding:16px;border-bottom:1px solid var(--border)}
#shead h1{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.5px}
#shead p{font-size:11px;color:var(--muted);margin-top:3px}
.pg{padding:6px 0}
.pl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:8px 14px 4px;display:flex;align-items:center;gap:6px}
.pl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.wbtn{display:flex;align-items:center;width:100%;padding:6px 14px;background:none;border:none;cursor:pointer;color:var(--text);font-size:12px;text-align:left;transition:background .12s;gap:0}
.wbtn:hover{background:#ffffff0d;color:var(--white)}
.wbtn.active{background:#58a6ff18;color:var(--accent);font-weight:600;border-right:2px solid var(--accent)}

.wcpp{font-size:9px;background:#f7816630;color:#f78166;border-radius:3px;padding:1px 4px;margin-left:auto;font-weight:700;flex-shrink:0}
#main{flex:1;overflow-y:auto;padding:28px 32px}
#main::-webkit-scrollbar{width:6px}
#main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.wh{margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.ptag{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:2px 9px;border-radius:20px;margin-bottom:8px}
.wh h2{font-size:24px;font-weight:700;color:var(--white)}
.wh .wd{font-size:13px;color:var(--muted);margin-top:5px}
.wh .wg{font-size:12px;color:var(--muted);margin-top:4px;font-style:italic}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-bottom:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:15px}
.ct{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.ctd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.card ul{list-style:none}
.card ul li{font-size:12.5px;padding:3.5px 0;border-bottom:1px solid #30363d40;line-height:1.45}
.card ul li:last-child{border-bottom:none}
.card ul li::before{content:'▸ ';color:var(--accent)}
.ptbl{width:100%;border-collapse:collapse;font-size:12.5px}
.ptbl th{text-align:left;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.7px;padding:6px 8px;border-bottom:1px solid var(--border)}
.ptbl td{padding:7px 8px;border-bottom:1px solid #30363d35}
.ptbl tr:last-child td{border-bottom:none}
.pn{font-weight:600;color:var(--accent)}
.dlvr{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid #30363d35;font-size:12.5px;cursor:pointer}
.dlvr:last-child{border-bottom:none}
.dlvr:hover .cb{border-color:var(--green)}
.cb{width:16px;height:16px;border:2px solid var(--border);border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cb.chk{background:var(--green);border-color:var(--green)}
.cb.chk::after{content:'✓';color:#000;font-size:10px;font-weight:900}
.dlvr.chk-row span{text-decoration:line-through;color:var(--muted)}
.sec-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

.assess h4{color:var(--green);font-size:13px;font-weight:700;margin-bottom:10px}
.assess ul{list-style:none}
.assess ul li{font-size:12.5px;padding:3px 0;color:var(--text)}
.assess ul li::before{content:'→ ';color:var(--green)}
.cpp-wrap{background:#160a00;border:1px solid #f7816635;border-radius:8px;padding:16px;margin-top:16px}
.cpp-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #f7816625}
.cpp-badge{background:#f78166;color:#000;font-size:10px;font-weight:800;padding:3px 9px;border-radius:4px;letter-spacing:.5px;flex-shrink:0}
.cpp-head h3{font-size:14px;font-weight:700;color:#f78166}
.cpp-src{font-size:11px;color:#f7816660;font-style:italic;margin-top:2px}
.dtbl{width:100%;border-collapse:collapse;font-size:12px}
.dtbl th{text-align:left;color:#f7816670;font-size:10px;text-transform:uppercase;letter-spacing:.7px;padding:5px 10px;border-bottom:1px solid #f7816620}
.dtbl td{padding:8px 10px;vertical-align:top;border-bottom:1px solid #f7816615;line-height:1.5}
.dtbl tr:last-child td{border-bottom:none}
.dn{font-weight:700;color:#f78166;white-space:nowrap;padding-right:12px}
.wkend{background:#f7816608}
.wkend .dn{color:#ffa07a}
.p1-tag{background:#388bfd18;color:#388bfd}
.p2-tag{background:#3fb95018;color:#3fb950}
.p3-tag{background:#d2992218;color:#d29922}
.p4-tag{background:#f7816618;color:#f78166}
.p5-tag{background:#bc8cff18;color:#bc8cff}
.ph4-tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:8px}
.ph4-tbl th{text-align:left;color:var(--muted);font-size:10px;text-transform:uppercase;padding:7px 10px;border-bottom:1px solid var(--border)}
.ph4-tbl td{padding:9px 10px;border-bottom:1px solid #30363d35;vertical-align:top}
.ph4-tbl tr:last-child td{border-bottom:none}
.ph4-tbl tr.cur{background:#f7816608}
.wk-col{font-weight:700;color:var(--orange);white-space:nowrap}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.sv{font-size:22px;font-weight:800;color:var(--accent)}
.sl{font-size:11px;color:var(--muted);margin-top:3px}
.note-box{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--yellow);border-radius:4px;padding:11px 14px;font-size:12.5px;color:var(--muted);margin-top:12px;line-height:1.5}

.js-puzzle-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #e3b34120}
.js-badge{background:#e3b341;color:#000;font-size:10px;font-weight:800;padding:3px 9px;border-radius:4px;letter-spacing:.5px;flex-shrink:0}
.js-puzzle-head h3{font-size:14px;font-weight:700;color:#e3b341}
.js-meta{font-size:11px;color:#e3b34165;margin-top:2px}

.js-progress-bar{flex:1;height:5px;background:#ffffff0f;border-radius:3px;overflow:hidden}
.js-progress-fill{height:100%;background:#e3b341;border-radius:3px;transition:width .4s}
.js-progress-label{font-size:11px;color:#e3b34180;white-space:nowrap}

.js-check:hover .js-cb{border-color:#e3b341}

.js-cb.solved{background:#e3b341;border-color:#e3b341}
.js-cb.solved::after{content:'★';color:#000;font-size:12px;line-height:1}

.js-notes{width:100%;background:#060e00;border:1px solid #e3b34125;border-radius:4px;padding:9px 11px;color:#c9d1d9;font-size:12.5px;font-family:inherit;resize:vertical;min-height:65px;line-height:1.5}
.js-notes::placeholder{color:#e3b34135}
.js-notes:focus{outline:none;border-color:#e3b34155}
.wcpp-js{font-size:9px;background:#e3b34125;color:#e3b341;border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:700;flex-shrink:0}

.lib-btn:hover{background:#ffffff0d;color:var(--white)}
.lib-btn.active{background:#58a6ff18;color:var(--accent)}
.lib-btn svg{flex-shrink:0}

.bpill:hover{border-color:var(--accent);color:var(--accent);background:#58a6ff0d}
.bpill-icon{font-size:12px}
.bpill-tag{font-size:9px;background:#ffffff12;border-radius:3px;padding:1px 5px;color:var(--muted)}
.blib-header{margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.blib-header h2{font-size:24px;font-weight:700;color:var(--white)}
.blib-header p{font-size:13px;color:var(--muted);margin-top:5px}
.blib-section{margin-bottom:28px}
.blib-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.blib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.bcard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;text-decoration:none;display:flex;flex-direction:column;gap:6px;transition:all .15s;cursor:pointer}
.bcard:hover{border-color:var(--accent);transform:translateY(-1px)}
.bcard-abbr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:2px 8px;border-radius:3px;align-self:flex-start}
.bcard-title{font-size:13px;font-weight:600;color:var(--white);line-height:1.35}
.bcard-author{font-size:11.5px;color:var(--muted)}
.bcard-weeks{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:4px}
.bcard-wbadge{font-size:10px;background:#ffffff0d;border-radius:3px;padding:1px 6px;color:var(--muted)}
.bcard-open{margin-top:auto;padding-top:10px;border-top:1px solid var(--border);font-size:11.5px;color:var(--accent);font-weight:600;display:flex;align-items:center;gap:5px}
</style>
</head>

let currentWeek = 1;
const STORAGE_KEY = 'quant-plan-checks';

function getChecks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveCheck(key, val) {
  const c = getChecks();
  c[key] = val;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(c));
}

function phaseColor(ph) {
  return ['','#388bfd','#3fb950','#d29922','#f78166','#bc8cff'][ph];
}
function phaseName(ph) {
  return ['','Foundation Revival','Core Quant Build','Advanced + Finance','Peak Prep + Apps','Interview Execution'][ph];
}
function phaseTagClass(ph) {
  return ['','p1-tag','p2-tag','p3-tag','p4-tag','p5-tag'][ph];
}

function buildNav() {
  const nav = document.getElementById('week-nav');
  const checks = getChecks();
  const libActive = currentWeek === 0 ? ' active' : '';
  let html = `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
    <button class="lib-btn${libActive}" onclick="showLibrary()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.5A1.5 1.5 0 012.5 1h3A1.5 1.5 0 017 2.5v3A1.5 1.5 0 015.5 7h-3A1.5 1.5 0 011 5.5v-3zm8 0A1.5 1.5 0 0110.5 1h3A1.5 1.5 0 0115 2.5v3A1.5 1.5 0 0113.5 7h-3A1.5 1.5 0 019 5.5v-3zm-8 8A1.5 1.5 0 012.5 9h3A1.5 1.5 0 017 10.5v3A1.5 1.5 0 015.5 15h-3A1.5 1.5 0 011 13.5v-3zm8 0A1.5 1.5 0 0110.5 9h3A1.5 1.5 0 0115 10.5v3A1.5 1.5 0 0113.5 15h-3A1.5 1.5 0 019 13.5v-3z"/></svg>
      📚 Book Library
    </button>
  </div>`;
  PHASES.forEach(ph => {
    const dot = `<span class="pl-dot" style="background:${ph.color}"></span>`;
    html += `<div class="pg"><div class="pl">${dot}Phase ${ph.id}: ${ph.name}</div>`;
    ph.weeks.forEach(wn => {
      const w = WEEKS[wn];
      const hasCpp = !!w.cpp;
      const hasJs = !!w.jsPuzzle;
      const active = wn === currentWeek ? ' active' : '';
      html += `<button class="wbtn${active}" onclick="showWeek(${wn})">
        <span class="wnum">W${wn}</span>${w.title}${hasCpp ? '<span class="wcpp">C++</span>' : ''}${hasJs ? '<span class="wcpp-js">JS★</span>' : ''}
      </button>`;
    });
    html += '</div>';
  });
  nav.innerHTML = html;
}

function showWeek(num) {
  currentWeek = num;
  buildNav();
  renderWeek(num);
}

function showLibrary() {
  currentWeek = 0;
  buildNav();
  renderLibrary();
}

function renderLibrary() {
  const cats = [...new Set(BOOKS.map(b=>b.cat))];
  let html = `<div class="blib-header">
    <h2>📚 Book Library</h2>
    <p>${BOOKS.length} books · Click any card to open the PDF in a new tab</p>
  </div>`;
  cats.forEach(cat => {
    const catBooks = BOOKS.filter(b=>b.cat===cat);
    html += `<div class="blib-section">
      <div class="blib-section-title">
        <span>${cat}</span>
        <span style="font-weight:400;font-size:10px">${catBooks.length} books</span>
      </div>
      <div class="blib-grid">`;
    catBooks.forEach(b => {
      html += `<a class="bcard" href="${burl(b.file)}" target="_blank" rel="noopener">
        <span class="bcard-abbr" style="background:${b.color}22;color:${b.color}">${b.abbr}</span>
        <div class="bcard-title">${b.title}</div>
        <div class="bcard-author">${b.author}</div>
        <div class="bcard-weeks">
          <span class="bcard-wbadge">Wk ${b.ws}–${b.we}</span>
        </div>
        <div class="bcard-open">↗ Open PDF</div>
      </a>`;
    });
    html += '</div></div>';
  });
  const main = document.getElementById('main');
  main.innerHTML = html;
  main.scrollTop = 0;
}

function renderWeek(num) {
  const w = WEEKS[num];
  if (!w) return;
  const checks = getChecks();
  const ph = w.phase;
  const color = phaseColor(ph);
  const tagCls = phaseTagClass(ph);

  let html = `<div class="wh">
    <span class="ptag ${tagCls}">Phase ${ph} — ${phaseName(ph)}</span>
    <h2>Week ${num}: ${w.title}</h2>
    <div class="wd">${w.dates}</div>
    ${w.goal ? `<div class="wg">${w.goal}</div>` : ''}
  </div>`;

  // Book reference pills for this week
  const activeBooks = BOOKS.filter(b => num >= b.ws && num <= b.we);
  if (activeBooks.length > 0) {
    html += '<div class="book-pills">';
    activeBooks.forEach(b => {
      html += `<a class="bpill" href="${burl(b.file)}" target="_blank" rel="noopener" title="${b.title} — ${b.author}">
        <span class="bpill-icon">📖</span>${b.abbr}
      </a>`;
    });
    html += '</div>';
  }

  // Sections grid
  if (w.sections && w.sections.length > 0) {
    html += '<div class="grid">';
    w.sections.forEach(sec => {
      html += `<div class="card">
        <div class="ct"><span class="ctd" style="background:${sec.color}"></span>${sec.title}</div>
        <ul>${sec.items.map(i => `<li>${i}</li>`).join('')}</ul>
      </div>`;
    });
    html += '</div>';
  }

  // Platforms
  if (w.platforms && w.platforms.length > 0) {
    html += `<div class="card" style="margin-bottom:14px">
      <div class="ct"><span class="ctd" style="background:#8b949e"></span>Platform Problems This Week</div>
      <table class="ptbl">
        <thead><tr><th>Platform</th><th>Problems / Target</th></tr></thead>
        <tbody>${w.platforms.map(p => `<tr><td class="pn">${p.name}</td><td>${p.p}</td></tr>`).join('')}</tbody>
      </table>
    </div>`;
  }

  // Deliverables
  if (w.deliverables && w.deliverables.length > 0) {
    html += `<div class="card" style="margin-bottom:14px">
      <div class="ct"><span class="ctd" style="background:#3fb950"></span>Deliverables</div>
      <div id="dlvr-list">`;
    w.deliverables.forEach((d, i) => {
      const key = `w${num}-d${i}`;
      const checked = checks[key];
      html += `<div class="dlvr${checked ? ' chk-row' : ''}" onclick="toggleCheck('${key}', this)">
        <div class="cb${checked ? ' chk' : ''}"></div>
        <span>${d}</span>
      </div>`;
    });
    html += '</div></div>';
  }

  // Assessment block
  if (w.assessment) {
    html += `<div class="assess">
      <h4>📊 ${w.assessment.title}</h4>
      <ul>${w.assessment.items.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>`;
  }
  if (w.phase4Assessment) {
    html += `<div class="assess">
      <h4>📊 ${w.phase4Assessment.title}</h4>
      <ul>${w.phase4Assessment.items.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>`;
  }

  // Jane Street Puzzle
  if (w.jsPuzzle) {
    const jp = w.jsPuzzle;
    const solvedKey = `js-solved-${jp.num}`;
    const notesKey = `js-notes-${jp.num}`;
    const c = getChecks();
    const solved = !!c[solvedKey];
    const notes = localStorage.getItem(notesKey) || '';
    const solvedCount = Array.from({length:9},(_,i)=>!!c[`js-solved-${i+1}`]).filter(Boolean).length;
    const pct = Math.round(solvedCount/9*100);
    html += `<div class="js-puzzle">
      <div class="js-puzzle-head">
        <span class="js-badge">JS PUZZLE ${jp.num}/9</span>
        <div><h3>${jp.month} 2026 Puzzle</h3><div class="js-meta">Released ${jp.released} · Due ${jp.deadline}</div></div>
        <span class="js-deadline">⚑ ${jp.deadline}</span>
      </div>
      <div class="js-mandatory">★ MANDATORY — Jane Street monthly puzzle — do not skip</div>
      <div class="js-progress-row">
        <div class="js-progress-bar"><div class="js-progress-fill" style="width:${pct}%"></div></div>
        <span class="js-progress-label">${solvedCount}/9 solved (${pct}%)</span>
      </div>
      <div class="js-check${solved ? '' : ''}" onclick="toggleJsSolved('${solvedKey}', this)">
        <div class="js-cb${solved ? ' solved' : ''}"></div>
        <span>${solved ? '★ Puzzle solved' : 'Mark as solved'}</span>
      </div>
      <div class="js-notes-label">Notes / Solution approach</div>
      <textarea class="js-notes" placeholder="Write your approach, key insight, or link to solution…" oninput="saveNotes('${notesKey}', this.value)">${notes}</textarea>
    </div>`;
  }

  // C++ Track
  if (w.cpp) {
    const cpp = w.cpp;
    html += `<div class="cpp-wrap">
      <div class="cpp-head">
        <span class="cpp-badge">C++ WEEK ${cpp.wn}</span>
        <div><h3>${cpp.title}</h3><div class="cpp-src">${cpp.src}</div></div>
      </div>
      ${cpp.note ? `<div class="note-box">📌 ${cpp.note}</div>` : ''}
      <table class="dtbl" style="margin-top:12px">
        <thead><tr><th style="width:110px">Day</th><th>Tasks (5 hours)</th></tr></thead>
        <tbody>${cpp.days.map(day => `
          <tr class="${day.w ? 'wkend' : ''}">
            <td class="dn">${day.d}</td>
            <td>${day.t}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }

  document.getElementById('main').innerHTML = html;
  document.getElementById('main').scrollTop = 0;
}

function toggleJsSolved(key, el) {
  const c = getChecks();
  const newVal = !c[key];
  saveCheck(key, newVal);
  const cb = el.querySelector('.js-cb');
  cb.classList.toggle('solved', newVal);
  el.querySelector('span').textContent = newVal ? '★ Puzzle solved' : 'Mark as solved';
  // Re-render progress bar
  const solvedCount = Array.from({length:9},(_,i)=>!!getChecks()[`js-solved-${i+1}`]).filter(Boolean).length;
  const pct = Math.round(solvedCount/9*100);
  const fill = document.querySelector('.js-progress-fill');
  const label = document.querySelector('.js-progress-label');
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = `${solvedCount}/9 solved (${pct}%)`;
}

function saveNotes(key, val) {
  localStorage.setItem(key, val);
}

function toggleCheck(key, el) {
  const c = getChecks();
  const newVal = !c[key];
  saveCheck(key, newVal);
  const cb = el.querySelector('.cb');
  cb.classList.toggle('chk', newVal);
  el.classList.toggle('chk-row', newVal);
}

// Init
buildNav();
renderWeek(1);
</script>
