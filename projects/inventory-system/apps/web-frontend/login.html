<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Veratori</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <style>
    :root {
      --bg-base: #070b12;
      --bg-card: #0e1623;
      --bg-input: #0c1322;
      --border: rgba(255,255,255,0.07);
      --border-light: rgba(255,255,255,0.10);
      --text-1: #f1f5f9;
      --text-2: #94a3b8;
      --text-3: #64748b;
      --green: #10b981;
      --green-glow: rgba(16,185,129,0.15);
      --red: #ef4444;
      --ease: cubic-bezier(0.4,0,0.2,1);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      background:var(--bg-base); min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      color:var(--text-1); -webkit-font-smoothing:antialiased;
    }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(16,185,129,0.05) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.04) 0%, transparent 55%);
    }
    .wrap { width:100%; max-width:400px; padding:20px; position:relative; z-index:1; }
    .card {
      background:var(--bg-card); border-radius:18px;
      padding:40px 36px 36px; border:1px solid var(--border);
      box-shadow:0 24px 60px rgba(0,0,0,0.5);
    }

    /* Logo */
    .logo-wrap { display:flex; justify-content:center; margin-bottom:28px; }
    .logo-wrap img { height:26px; width:auto; display:block; }

    /* Tab switcher */
    .tabs {
      display:flex; background:rgba(255,255,255,0.04); border-radius:10px;
      padding:3px; margin-bottom:24px; gap:3px;
    }
    .tab {
      flex:1; padding:7px 0; border-radius:8px; border:none; background:none;
      font-size:12.5px; font-weight:600; color:var(--text-3); cursor:pointer;
      font-family:'Inter',sans-serif; transition:all .18s var(--ease);
    }
    .tab.active { background:#1a2540; color:var(--text-1); box-shadow:0 1px 4px rgba(0,0,0,0.3); }

    /* Google button */
    .btn-google {
      width:100%; display:flex; align-items:center; justify-content:center; gap:10px;
      padding:11px 16px; border-radius:9px; border:1px solid var(--border-light);
      background:rgba(255,255,255,0.04); color:var(--text-1);
      font-size:13.5px; font-weight:600; cursor:pointer;
      font-family:'Inter',sans-serif; transition:all .15s var(--ease);
      margin-bottom:20px;
    }
    .btn-google:hover { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.16); }
    .btn-google svg { width:18px; height:18px; flex-shrink:0; }

    /* Divider */
    .divider {
      display:flex; align-items:center; gap:12px; margin-bottom:20px;
    }
    .divider::before, .divider::after {
      content:''; flex:1; height:1px; background:var(--border);
    }
    .divider span { font-size:11px; color:var(--text-3); font-weight:500; white-space:nowrap; }

    /* Form */
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:12px; font-weight:600; color:var(--text-2); margin-bottom:6px; }
    .field input {
      width:100%; padding:11px 14px; font-size:13.5px;
      background:var(--bg-input); border:1px solid var(--border-light);
      border-radius:8px; color:var(--text-1); font-family:'Inter',sans-serif;
      transition:all .15s var(--ease); outline:none;
    }
    .field input:hover { border-color:rgba(255,255,255,0.15); }
    .field input:focus { border-color:var(--green); box-shadow:0 0 0 3px var(--green-glow); }
    .field input::placeholder { color:var(--text-3); }

    /* Submit button */
    .btn-submit {
      width:100%; padding:12px; margin-top:4px; border-radius:9px; border:none;
      background:linear-gradient(135deg,var(--green),#059669);
      color:#fff; font-size:13.5px; font-weight:700; cursor:pointer;
      font-family:'Inter',sans-serif; transition:all .15s var(--ease);
      box-shadow:0 2px 10px rgba(16,185,129,0.25);
    }
    .btn-submit:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(16,185,129,0.35); }
    .btn-submit:active { transform:translateY(0); }
    .btn-submit:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }

    /* Error / success */
    .msg {
      display:none; padding:11px 14px; border-radius:8px;
      font-size:12.5px; font-weight:500; margin-bottom:16px;
      animation:fadeIn .25s var(--ease);
    }
    .msg.error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:var(--red); display:flex; }
    .msg.success { background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.2); color:var(--green); display:flex; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

    /* Spinner */
    .spinner {
      display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.3);
      border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; margin-right:7px; vertical-align:middle;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    .footer { text-align:center; margin-top:24px; padding-top:20px; border-top:1px solid var(--border); }
    .footer p { font-size:11px; color:var(--text-3); line-height:1.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo-wrap">
        <img src="logo.png" alt="Veratori">
      </div>

      <!-- Sign In / Create Account tabs -->
      <div class="tabs">
        <button class="tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
        <button class="tab" id="tabCreate" onclick="switchTab('create')">Create Account</button>
      </div>

      <!-- Message area -->
      <div class="msg" id="msg"></div>

      <!-- Google -->
      <button class="btn-google" onclick="signInWithGoogle()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider"><span>or</span></div>

      <!-- Email/Password form -->
      <form id="authForm" onsubmit="submitForm(event)">
        <div class="field" id="nameField" style="display:none">
          <label>Full Name</label>
          <input type="text" id="nameInput" placeholder="Philip Cardozo" autocomplete="name">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="emailInput" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="passInput" placeholder="Min. 8 characters" required autocomplete="current-password" minlength="8">
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
      </form>

      <div class="footer">
        <p>Veratori Intelligence Platform</p>
        <p>Secured by Firebase Authentication</p>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBTBYkalSjJBQjOZYetfySmG9ByEgWCcJo",
      authDomain: "veratori-f3a5a.firebaseapp.com",
      projectId: "veratori-f3a5a",
      storageBucket: "veratori-f3a5a.firebasestorage.app",
      messagingSenderId: "856326715875",
      appId: "1:856326715875:web:c9f191acde64da90d208d6"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // If already signed in, go straight to hub
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'home.html';
    });

    let mode = 'signin'; // 'signin' | 'create'

    function switchTab(tab) {
      mode = tab;
      const isCreate = tab === 'create';
      document.getElementById('tabSignIn').classList.toggle('active', !isCreate);
      document.getElementById('tabCreate').classList.toggle('active', isCreate);
      document.getElementById('nameField').style.display = isCreate ? 'block' : 'none';
      document.getElementById('passInput').setAttribute('autocomplete', isCreate ? 'new-password' : 'current-password');
      document.getElementById('submitBtn').textContent = isCreate ? 'Create Account' : 'Sign In';
      clearMsg();
    }

    async function signInWithGoogle() {
      clearMsg();
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        await auth.signInWithPopup(provider);
        window.location.href = 'home.html';
      } catch (err) {
        showMsg('error', friendlyError(err.code));
      }
    }

    async function submitForm(e) {
      e.preventDefault();
      clearMsg();
      const email = document.getElementById('emailInput').value.trim();
      const pass  = document.getElementById('passInput').value;
      const btn   = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span>${mode === 'create' ? 'Creating account…' : 'Signing in…'}`;

      try {
        if (mode === 'create') {
          const name = document.getElementById('nameInput').value.trim();
          const cred = await auth.createUserWithEmailAndPassword(email, pass);
          if (name) await cred.user.updateProfile({ displayName: name });
        } else {
          await auth.signInWithEmailAndPassword(email, pass);
        }
        window.location.href = 'home.html';
      } catch (err) {
        showMsg('error', friendlyError(err.code));
        btn.disabled = false;
        btn.textContent = mode === 'create' ? 'Create Account' : 'Sign In';
      }
    }

    function showMsg(type, text) {
      const el = document.getElementById('msg');
      el.className = `msg ${type}`;
      el.textContent = text;
    }
    function clearMsg() {
      const el = document.getElementById('msg');
      el.className = 'msg';
      el.textContent = '';
    }

    function friendlyError(code) {
      const map = {
        'auth/user-not-found':       'No account found with this email.',
        'auth/wrong-password':       'Incorrect password. Please try again.',
        'auth/invalid-email':        'Please enter a valid email address.',
        'auth/email-already-in-use': 'An account with this email already exists.',
        'auth/weak-password':        'Password must be at least 8 characters.',
        'auth/popup-closed-by-user': 'Google sign-in was cancelled.',
        'auth/too-many-requests':    'Too many attempts. Please wait a moment.',
        'auth/invalid-credential':   'Incorrect email or password.',
      };
      return map[code] || 'Something went wrong. Please try again.';
    }
  </script>
</body>
</html>
